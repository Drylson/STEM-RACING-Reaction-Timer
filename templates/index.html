<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Reaction Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #E8002D;
    --red-glow: #ff1e3f;
    --dark:   #0a0a0a;
    --card:   #111111;
    --border: #222222;
    --text:   #f0f0f0;
    --muted:  #555;
    --gold:   #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Noise texture overlay --- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* --- Header --- */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .logo-stripe {
    width: 6px; height: 36px;
    background: var(--red);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--red);
  }
  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--text);
  }
  .logo-text span { color: var(--red); }

  /* --- Layout --- */
  .layout {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 73px);
    position: relative;
    z-index: 1;
  }

  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 40px;
  }

  .side-panel {
    width: 320px;
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* --- Username input --- */
  .username-box {
    text-align: center;
  }
  .username-box label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Orbitron', monospace;
  }
  .username-box input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 4px;
    text-align: center;
    width: 260px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .username-box input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 2px rgba(232,0,45,0.15);
  }
  .username-box input::placeholder { color: var(--muted); }

  /* --- Lights panel --- */
  .lights-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .lights-housing {
    background: linear-gradient(180deg, #1a1a1a 0%, #0e0e0e 100%);
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px 28px;
    display: flex;
    gap: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .light {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #1a0000;
    border: 2px solid #2d0000;
    position: relative;
    transition: background 0.08s, box-shadow 0.08s, border-color 0.08s;
  }
  .light.on {
    background: var(--red);
    border-color: #ff4466;
    box-shadow:
      0 0 8px var(--red),
      0 0 24px var(--red),
      0 0 48px rgba(232,0,45,0.5),
      inset 0 1px 0 rgba(255,100,100,0.4);
  }
  .light::after {
    content: '';
    position: absolute;
    top: 8px; left: 10px;
    width: 14px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .light.on::after {
    background: rgba(255,255,255,0.3);
  }

  /* --- Status text --- */
  .status-text {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    min-height: 22px;
    transition: color 0.2s;
    text-align: center;
  }
  .status-text.active { color: var(--text); }
  .status-text.go { color: #00ff88; }
  .status-text.early { color: var(--red); }

  /* --- Big reaction display --- */
  .reaction-display {
    text-align: center;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .reaction-ms {
    font-family: 'Orbitron', monospace;
    font-size: 4.5rem;
    font-weight: 900;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
    display: none;
  }
  .reaction-ms span { color: var(--red); font-size: 2rem; vertical-align: super; }
  .reaction-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
    display: none;
  }
  .reaction-verdict {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-top: 4px;
    display: none;
  }

  /* --- Start button --- */
  .btn-start {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 44px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(232,0,45,0.35);
  }
  .btn-start:hover {
    background: #ff0030;
    box-shadow: 0 4px 28px rgba(232,0,45,0.55);
    transform: translateY(-1px);
  }
  .btn-start:active { transform: translateY(0); }
  .btn-start:disabled {
    background: #330010;
    color: #660020;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* --- Click zone --- */
  #clickZone {
    position: fixed; inset: 0;
    z-index: 50;
    cursor: pointer;
    display: none;
  }

  /* --- Leaderboard --- */
  .lb-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .lb-title span { color: var(--red); }

  .lb-table {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 4px;
    background: transparent;
    transition: background 0.15s;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .lb-row:hover { background: rgba(255,255,255,0.03); }
  .lb-row.highlight { background: rgba(232,0,45,0.08); border: 1px solid rgba(232,0,45,0.2); }
  .lb-pos {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    width: 22px;
    text-align: center;
    color: var(--muted);
    flex-shrink: 0;
  }
  .lb-pos.p1 { color: var(--gold); }
  .lb-pos.p2 { color: var(--silver); }
  .lb-pos.p3 { color: var(--bronze); }
  .lb-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.05em;
  }
  .lb-time {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: var(--red);
    flex-shrink: 0;
  }
  .lb-empty {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    padding: 20px 0;
    font-style: italic;
  }

  /* --- Save score section --- */
  .save-section {
    display: none;
    flex-direction: column;
    gap: 10px;
    text-align: center;
  }
  .save-section.visible { display: flex; }
  .btn-save {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 10px 24px;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-save:hover {
    background: var(--red);
    color: white;
  }
  .save-note {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .save-ok {
    color: #00ff88;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    display: none;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .side-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    .reaction-ms { font-size: 3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-stripe"></div>
  <div class="logo-text">F1 <span>REACTION</span> TIMER</div>
</header>

<div id="clickZone" onclick="handleClick()"></div>

<div class="layout">

  <!-- MAIN PANEL -->
  <div class="main-panel">

    <div class="username-box">
      <label>Nombre de piloto</label>
      <input type="text" id="username" placeholder="Tu nombre (opcional)" maxlength="20" autocomplete="off">
    </div>

    <div class="lights-panel">
      <div class="lights-housing">
        <div class="light" id="l1"></div>
        <div class="light" id="l2"></div>
        <div class="light" id="l3"></div>
        <div class="light" id="l4"></div>
        <div class="light" id="l5"></div>
      </div>
      <div class="status-text" id="statusText">Pulsa START para comenzar</div>
    </div>

    <div class="reaction-display">
      <div class="reaction-ms" id="reactionMs">—<span>ms</span></div>
      <div class="reaction-label" id="reactionLabel">Tiempo de reacción</div>
      <div class="reaction-verdict" id="reactionVerdict"></div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startSequence()">START</button>

    <div class="save-section" id="saveSection">
      <button class="btn-save" id="btnSave" onclick="saveScore()">💾 Guardar en leaderboard</button>
      <div class="save-note" id="saveNote"></div>
      <div class="save-ok" id="saveOk">✔ GUARDADO</div>
    </div>

  </div>

  <!-- SIDE PANEL: Leaderboard -->
  <div class="side-panel">
    <div class="lb-title">🏆 <span>LEADERBOARD</span></div>
    <div class="lb-table" id="lbTable">
      <div class="lb-empty">Aún no hay tiempos registrados</div>
    </div>
    <button class="btn-save" style="margin-top:auto" onclick="loadLeaderboard()">↻ Actualizar</button>
  </div>

</div>

<script>
  // --- State ---
  let state = 'idle'; // idle | sequence | waiting | done | false_start
  let lightTimers = [];
  let goTimer = null;
  let startTime = null;
  let lastReactionMs = null;

  const lights = [
    document.getElementById('l1'),
    document.getElementById('l2'),
    document.getElementById('l3'),
    document.getElementById('l4'),
    document.getElementById('l5'),
  ];
  const statusText   = document.getElementById('statusText');
  const btnStart     = document.getElementById('btnStart');
  const reactionMs   = document.getElementById('reactionMs');
  const reactionLabel= document.getElementById('reactionLabel');
  const reactionVerdict = document.getElementById('reactionVerdict');
  const saveSection  = document.getElementById('saveSection');
  const btnSave      = document.getElementById('btnSave');
  const saveNote     = document.getElementById('saveNote');
  const saveOk       = document.getElementById('saveOk');
  const clickZone    = document.getElementById('clickZone');

  function resetLights() {
    lights.forEach(l => l.classList.remove('on'));
  }

  function setStatus(text, cls) {
    statusText.textContent = text;
    statusText.className = 'status-text' + (cls ? ' ' + cls : '');
  }

  function verdict(ms) {
    if (ms < 150) return { text: '⚡ INCREÍBLE — Nivel F1', color: '#00ff88' };
    if (ms < 200) return { text: '🏎️ EXCELENTE — Muy rápido', color: '#88ff44' };
    if (ms < 250) return { text: '✅ BUENO — Por encima de la media', color: '#ccff00' };
    if (ms < 300) return { text: '🟡 NORMAL — Tiempo típico', color: '#ffcc00' };
    if (ms < 400) return { text: '🐢 LENTO — Puedes mejorar', color: '#ff8800' };
    return           { text: '💤 MUY LENTO — ¿Te dormiste?', color: '#ff3300' };
  }

  function startSequence() {
    if (state !== 'idle') return;
    state = 'sequence';

    // Reset UI
    resetLights();
    reactionMs.style.display = 'none';
    reactionLabel.style.display = 'none';
    reactionVerdict.style.display = 'none';
    saveSection.classList.remove('visible');
    saveOk.style.display = 'none';
    btnSave.disabled = false;
    btnSave.textContent = '💾 Guardar en leaderboard';
    btnStart.disabled = true;
    lastReactionMs = null;

    setStatus('PREPARADOS...', 'active');

    // Light up one by one, 500ms apart
    const delays = [600, 1200, 1800, 2400, 3000];
    lightTimers = delays.map((d, i) =>
      setTimeout(() => {
        lights[i].classList.add('on');
        if (i === 4) setStatus('MOTORES AL MÁXIMO...', 'active');
      }, d)
    );

    // Random extra wait after all 5 lights (0.5s to 3s), then GO
    const extraWait = 500 + Math.random() * 2500;
    goTimer = setTimeout(() => {
      resetLights();
      state = 'waiting';
      startTime = performance.now();
      setStatus('¡¡ ARRANCA !!', 'go');
      clickZone.style.display = 'block';
    }, 3000 + extraWait);

    // Enable clickzone early to catch false starts
    setTimeout(() => {
      if (state === 'sequence') clickZone.style.display = 'block';
    }, 600);
  }

  function handleClick() {
    if (state === 'sequence') {
      // FALSE START
      falseStart();
    } else if (state === 'waiting') {
      const now = performance.now();
      const ms = Math.round(now - startTime);
      showResult(ms);
    }
  }

  function falseStart() {
    state = 'false_start';
    lightTimers.forEach(clearTimeout);
    clearTimeout(goTimer);
    clickZone.style.display = 'none';

    resetLights();
    // Flash all red
    lights.forEach(l => l.classList.add('on'));
    setTimeout(() => resetLights(), 600);

    setStatus('🚩 SALIDA EN FALSO', 'early');
    reactionMs.style.display = 'none';
    reactionLabel.style.display = 'none';
    reactionVerdict.style.display = 'none';

    reactionMs.innerHTML = '—<span>ms</span>';
    reactionVerdict.textContent = 'Salida en falso — ¡penalización!';
    reactionVerdict.style.color = 'var(--red)';
    reactionMs.style.display = 'block';
    reactionLabel.style.display = 'block';
    reactionVerdict.style.display = 'block';

    saveSection.classList.remove('visible');
    setTimeout(() => { state = 'idle'; btnStart.disabled = false; }, 1500);
  }

  function showResult(ms) {
    state = 'done';
    lastReactionMs = ms;
    clickZone.style.display = 'none';
    btnStart.disabled = false;

    setStatus('');
    reactionMs.innerHTML = ms + '<span>ms</span>';
    reactionMs.style.display = 'block';
    reactionLabel.style.display = 'block';

    const v = verdict(ms);
    reactionVerdict.textContent = v.text;
    reactionVerdict.style.color = v.color;
    reactionVerdict.style.display = 'block';

    // Show save section if there's a username
    const uname = document.getElementById('username').value.trim();
    if (uname) {
      saveNote.textContent = `Guardar como "${uname}"`;
      saveSection.classList.add('visible');
    }

    btnStart.textContent = 'REPETIR';
    state = 'idle';
  }

  async function saveScore() {
    if (!lastReactionMs) return;
    const username = document.getElementById('username').value.trim();
    if (!username) { alert('Introduce tu nombre de piloto primero.'); return; }

    btnSave.disabled = true;
    btnSave.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, reaction_ms: lastReactionMs }),
      });
      if (res.ok) {
        saveOk.style.display = 'block';
        btnSave.style.display = 'none';
        await loadLeaderboard();
      } else {
        btnSave.textContent = 'Error al guardar';
      }
    } catch(e) {
      btnSave.textContent = 'Error de conexión';
    }
  }

  async function loadLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      const table = document.getElementById('lbTable');
      const username = document.getElementById('username').value.trim().toLowerCase();

      if (!data.length) {
        table.innerHTML = '<div class="lb-empty">Aún no hay tiempos registrados</div>';
        return;
      }

      table.innerHTML = data.map((row, i) => {
        const pos = i + 1;
        const posClass = pos === 1 ? 'p1' : pos === 2 ? 'p2' : pos === 3 ? 'p3' : '';
        const isMe = row.username.toLowerCase() === username;
        return `
          <div class="lb-row ${isMe ? 'highlight' : ''}">
            <div class="lb-pos ${posClass}">${pos}</div>
            <div class="lb-name">${escapeHtml(row.username)}</div>
            <div class="lb-time">${row.best_ms}<span style="font-size:0.65rem;color:var(--muted)">ms</span></div>
          </div>
        `;
      }).join('');
    } catch(e) {
      document.getElementById('lbTable').innerHTML = '<div class="lb-empty">Error cargando datos</div>';
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Also allow keyboard: spacebar to start / react
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (state === 'idle') startSequence();
      else if (state === 'sequence' || state === 'waiting') handleClick();
    }
  });

  // Load leaderboard on page load
  loadLeaderboard();
</script>
</body>
</html>
